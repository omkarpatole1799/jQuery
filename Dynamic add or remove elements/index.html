<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">

    <!-- custom font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet">

    <!-- custom css include -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">
<!-- container -->
    <div class="container">
        <div class="row my-4">
            <div class="col-lg-10 mx-auto">
                <div class="card shadow">
                    <div class="card-header">
                        <h4>Task</h4>

                    </div>
                    <div class="card-body p-4">
                        <button id="submitButton" type="submit" class="btn btn-primary col-md-2 m-3">Submit</button>
                        <button id="addButton" class="btn btn-success addButton col-md-2 m-3">Add</button>
                        <!-- <button id="resetButton" class="btn btn-success addButton col-md-2">Reset</button> -->

                        <form id="myForm" action="">

                            <div class="row">
                                <div class="col-md-3 mb-4">
                                    <input id="email" type="text" name="email" class="form-control emailInput" placeholder="Email"
                                        required>
                                </div>

                                <div class="col-md-3 mb-4">
                                    <input id="name" type="text" name="name" class="form-control nameInput" placeholder="Name"
                                        required>
                                </div>

                                <div class="col-md-3 mb-4">
                                    <input id="phone" type="text" name="phone" class="form-control phoneInput" placeholder="Phone"
                                        required>
                                </div>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="showJson" class="container">

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8"
        crossorigin="anonymous"></script>

    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
    <script type="text/javascript" src="scripts/jquery.placeholder.label.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.js"></script>

    <!-- custom js include -->
    <!-- <script src="scripts/script.js"></script> -->
    <script src="scripts/script.js"></script>
</body>

</html>
