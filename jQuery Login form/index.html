<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form</title>

    <!-- custom css include -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- <h1>Hello world</h1> -->
    <div class="loginForm">

        <form id="myForm" action="">

            <h3 class="heading">Login!</h3>

            <div class="input">

                <input id="email" class="myInput" type="text" placeholder="Email" alt="email" name="email"> <br>
            </div>

            <div class="input">

                <input id="name" class="myInput" type="text" placeholder="Name" alt="Name" name="name"> <br>
            </div>

            <div class="input">

                <input id="age" class="myInput" type="text" placeholder="Age" alt="age" name="age"> <br>
            </div>

            <div class="input">

                <input id="phone" class="myInput" type="text" placeholder="Phone" alt="phone" name="phone"><br>
            </div>

            <button type="submit" id="myButton">Login</button>
        </form>

        <div class="image">
            <img src="images/samantha-borges-gXsJ9Ywb5as-unsplash.jpg" alt="Laptop Image">
        </div>
    </div>







<!-- jquery cdn include -->
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
    <script type="text/javascript" src="scripts/jquery.placeholder.label.js"></script>

    <!-- jquery validate plugin cdn include -->
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.js"></script>

    <!-- custom js include -->
    <script src="scripts/script.js"></script>
</body>

</html>
